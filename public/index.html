<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MindMate</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="chat-container">

        <div class="top-bar">

            <div class="profile">

                <div class="avatar">
                    🌊
                </div>

                <div>

                    <h2>MindMate</h2>

                    <p>
                        Online • Wellness AI
                    </p>

                </div>

            </div>

        </div>

        <div id="chat-box">

            <div class="welcome-message">

                <h3>
                    Welcome to MindMate 💙
                </h3>

                <p>
                    Talk freely about your feelings,
                    stress, anxiety, motivation,
                    or daily life.
                </p>

            </div>

        </div>

        <div class="input-container">

            <input
                type="text"
                id="user-input"
                placeholder="Type your message..."
            >

            <button onclick="sendMessage()">
                ➤
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
