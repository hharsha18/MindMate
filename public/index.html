<!DOCTYPE html>
<html>

<head>
    <title>MindMate</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>MindMate 🌸</h1>

    <div id="chat-box"></div>

    <div class="controls">

        <select id="language">

            <option value="english">
                English
            </option>

            <option value="hindi">
                Hindi
            </option>

            <option value="kannada">
                Kannada
            </option>

        </select>

        <input
            type="text"
            id="user-input"
            placeholder="How are you feeling today?"
        >

        <button onclick="sendMessage()">Send</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
